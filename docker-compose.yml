version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sbom_risk_scorer
      POSTGRES_USER: sbom
      POSTGRES_PASSWORD: sbom_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbom -d sbom_risk_scorer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sbom:sbom_password@postgres:5432/sbom_risk_scorer
      SYNC_DATABASE_URL: postgresql://sbom:sbom_password@postgres:5432/sbom_risk_scorer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SBOM_STORAGE_PATH: /app/storage/sboms
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - sbom_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sbom:sbom_password@postgres:5432/sbom_risk_scorer
      SYNC_DATABASE_URL: postgresql://sbom:sbom_password@postgres:5432/sbom_risk_scorer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SBOM_STORAGE_PATH: /app/storage/sboms
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - sbom_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info -Q analysis,celery

volumes:
  pgdata:
  sbom_storage:
